<!DOCTYPE html>
<html lang="en">
<head>

<title>Listen and Choose a Response — Practice 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;}
.top-nav{background:#2d3748;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:10px 24px;font-size:14px;}
.nav-left{display:flex;align-items:center;gap:12px;}
.nav-left .q-num{font-weight:700;font-size:15px;}
.nav-left .divider{color:#718096;}
.nav-left .section-label{color:#a0aec0;}
.nav-right{display:flex;align-items:center;gap:16px;}
.timer-display{font-family:'Courier New',monospace;font-size:16px;font-weight:700;min-width:42px;text-align:center;}
.timer-display.warning{color:#fc8181;animation:blink 0.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-toggle{background:none;border:1px solid #4a5568;color:#a0aec0;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;}
.btn-toggle:hover{background:#4a5568;}
.user-badge{width:28px;height:28px;border-radius:50%;background:#4a90d9;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;}
.progress-bar{height:4px;background:#e2e8f0;}
.progress-fill{height:100%;background:#4a90d9;transition:width 0.3s;}
.start-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;}
.start-card{background:#fff;border-radius:12px;padding:48px;text-align:center;max-width:480px;}
.start-card h2{color:#2d3748;margin-bottom:12px;font-size:22px;}
.start-card p{color:#718096;margin-bottom:24px;font-size:15px;line-height:1.6;}
.btn-start{background:#4a90d9;color:#fff;border:none;padding:14px 36px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:background 0.2s;}
.btn-start:hover{background:#3a7cc0;}
.main-content{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px 0;}
.speaker-area{background:#f9fafb;border-radius:12px;padding:24px;text-align:center;width:100%;max-width:800px;margin-bottom:20px;border:1px solid #e2e8f0;}
.speaker-img{max-height:260px;border-radius:8px;object-fit:contain;}
.audio-indicator{display:none;align-items:center;justify-content:center;gap:8px;margin-top:12px;color:#4a90d9;font-size:14px;font-weight:500;}
.audio-indicator.active{display:flex;}
.wave-bars{display:flex;align-items:flex-end;gap:3px;height:20px;}
.wave-bar{width:3px;background:#4a90d9;border-radius:2px;animation:wave 0.8s ease-in-out infinite;}
.wave-bar:nth-child(1){height:8px;animation-delay:0s;}
.wave-bar:nth-child(2){height:14px;animation-delay:0.1s;}
.wave-bar:nth-child(3){height:20px;animation-delay:0.2s;}
.wave-bar:nth-child(4){height:14px;animation-delay:0.3s;}
.wave-bar:nth-child(5){height:8px;animation-delay:0.4s;}
@keyframes wave{0%,100%{transform:scaleY(0.5);}50%{transform:scaleY(1);}}
.choices-area{width:100%;max-width:800px;}
.choices-area h2{font-size:16px;color:#2d3748;margin-bottom:4px;}
.prompt-text{color:#718096;font-size:13px;margin-bottom:14px;}
.options-container{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:center;gap:12px;padding:14px 16px;border:2px solid #e2e8f0;border-radius:8px;cursor:pointer;transition:all 0.15s;background:#fff;}
.option:hover{border-color:#4a90d9;background:#f7faff;}
.option.selected{border-color:#4a90d9;background:#ebf4ff;}
.option.locked{opacity:0.4;pointer-events:none;}
.option-letter{width:30px;height:30px;border-radius:50%;background:#edf2f7;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#4a5568;flex-shrink:0;}
.option.selected .option-letter{background:#4a90d9;color:#fff;}
.option-text{font-size:14px;color:#2d3748;line-height:1.4;}
.footer-nav{background:#fff;border-top:1px solid #e2e8f0;padding:12px 24px;display:flex;justify-content:flex-end;}
.btn-next{display:flex;align-items:center;gap:6px;background:#4a90d9;color:#fff;border:none;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn-next:hover{background:#3a7cc0;}
.btn-next.disabled{opacity:0.5;pointer-events:none;}
.btn-next svg{width:18px;height:18px;fill:#fff;}
.retry-btn{display:none;margin-top:12px;padding:10px 20px;background:#4a90d9;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;}
.retry-btn:hover{background:#3a7cc0;}
</style>
</head>

/* ===== STATE ===== */
let currentQ = 0;
let currentAudio = null;
let timerInterval = null;
let timeLeft = 20;
let timerHidden = false;
let answers = {};
let started = false;

/* ===== CHECK URL PARAM ===== */
(function(){
    const params = new URLSearchParams(window.location.search);
    if(params.get('play') === '1'){
        document.getElementById('startOverlay').style.display='none';
        started = true;
        const instAudio = new Audio(instructionAudio);
        instAudio.addEventListener('ended', () => {
            setTimeout(() => { loadQuestion(0); }, 1500);
        });
        instAudio.addEventListener('error', () => { loadQuestion(0); });
        instAudio.play().catch(() => { loadQuestion(0); });
    }
})();

/* ===== START ===== */
function startQuiz(){
    document.getElementById('startOverlay').style.display='none';
    started = true;
    const instAudio = new Audio(instructionAudio);
    instAudio.addEventListener('ended', () => {
        setTimeout(() => { loadQuestion(0); }, 1500);
    });
    instAudio.addEventListener('error', () => {
        loadQuestion(0);
    });
    instAudio.play().catch(() => { loadQuestion(0); });
}

/* ===== LOAD QUESTION ===== */
function loadQuestion(idx){
    currentQ = idx;
    const q = questions[idx];
    document.getElementById('qNum').innerHTML = 'Question <strong>'+(idx+1)+'</strong> of 8';
    document.getElementById('progressFill').style.width = (((idx+1)/8)*100)+'%';
    const img = document.getElementById('speakerImg');
    img.src = speakerImages[q.imageKey][q.imageIdx];
    document.getElementById('audioIndicator').classList.remove('active');
    document.getElementById('retryBtn').style.display='none';
    document.getElementById('timer').textContent='--:--';
    document.getElementById('timer').classList.remove('warning');
    document.getElementById('btnNext').classList.add('disabled');
    clearInterval(timerInterval);
    const container = document.getElementById('optionsContainer');
    container.innerHTML = '';
    q.choices.forEach(c => {
        const div = document.createElement('div');
        div.className = 'option locked';
        div.dataset.letter = c.letter;
        div.innerHTML = '<div class="option-letter">'+c.letter+'</div><div class="option-text">'+c.text+'</div>';
        div.onclick = function(){ selectOption(this, c.letter); };
        container.appendChild(div);
    });
    setTimeout(()=>{ playAudio(q.audio); }, 1500);
}

/* ===== AUDIO ===== */
function playAudio(src){
    if(currentAudio){ currentAudio.pause(); currentAudio=null; }
    document.getElementById('audioIndicator').classList.add('active');
    currentAudio = new Audio(src);
    currentAudio.addEventListener('ended', onAudioEnd);
    currentAudio.addEventListener('error', onAudioEnd);
    currentAudio.play().catch(()=>{
        document.getElementById('audioIndicator').classList.remove('active');
        document.getElementById('retryBtn').style.display='inline-block';
    });
}

function retryAudio(){
    document.getElementById('retryBtn').style.display='none';
    playAudio(questions[currentQ].audio);
}

function onAudioEnd(){
    document.getElementById('audioIndicator').classList.remove('active');
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('locked'));
    startTimer();
}

/* ===== TIMER ===== */
function startTimer(){
    timeLeft = 20;
    updateTimerDisplay();
    timerInterval = setInterval(()=>{
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 5){
            document.getElementById('timer').classList.add('warning');
        }
        if(timeLeft <= 0){
            clearInterval(timerInterval);
            goNext();
        }
    },1000);
}

function updateTimerDisplay(){
    if(!timerHidden){
        document.getElementById('timer').textContent = '0:'+String(timeLeft).padStart(2,'0');
    }
}

function toggleTimer(){
    timerHidden = !timerHidden;
    document.getElementById('btnTime').textContent = timerHidden ? 'Show Time' : 'Hide Time';
    document.getElementById('timer').textContent = timerHidden ? '--:--' : '0:'+String(timeLeft).padStart(2,'0');
}

/* ===== SELECT ===== */
function selectOption(el, letter){
    document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
    el.classList.add('selected');
    answers[currentQ] = letter;
    document.getElementById('btnNext').classList.remove('disabled');
}

/* ===== NEXT ===== */
function goNext(){
    clearInterval(timerInterval);
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    const q = questions[currentQ];
    const userAns = answers[currentQ] || null;
    const stored = JSON.parse(sessionStorage.getItem('lcrAnswers')||'{}');
    stored['q'+(currentQ+1)] = {
        selected: userAns,
        correct: q.answer,
        isCorrect: userAns === q.answer
    };
    sessionStorage.setItem('lcrAnswers', JSON.stringify(stored));

    if(currentQ < questions.length - 1){
        loadQuestion(currentQ + 1);
    } else {
        document.querySelector('.main-content').innerHTML =
            '<div style="text-align:center;padding:60px 20px;max-width:600px;">' +

            '<div id="resultSummary" style="text-align:left;background:#f7fafc;border-radius:8px;padding:20px;margin-bottom:24px;"></div>' +
            '<a href="practice-1-answers.html" style="display:inline-block;margin-top:8px;padding:14px 36px;background:#4a90d9;color:#fff;border-radius:8px;font-size:15px;font-weight:600;text-decoration:none;">解答解説を見る →</a>' +
            '</div>';
        document.getElementById('btnNext').classList.add('disabled');
        document.getElementById('timer').textContent = '--:--';
        const stored2 = JSON.parse(sessionStorage.getItem('lcrAnswers')||'{}');
        let correct = 0;
        let html = '';
        for(let i=1;i<=8;i++){
            const a = stored2['q'+i];
            if(a){
                const icon = a.isCorrect ? '✅' : '❌';
                correct += a.isCorrect ? 1 : 0;
                html += '<div style="padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:14px;">'+icon+' Q'+i+': You chose ('+( a.selected||'—' )+') — Correct: ('+a.correct+')</div>';
            } else {
                html += '<div style="padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:14px;">⏱️ Q'+i+': No answer</div>';
            }
        }
        html = '<p style="font-weight:700;font-size:16px;margin-bottom:12px;">Score: '+correct+' / 8</p>' + html;
        document.getElementById('resultSummary').innerHTML = html;
    }
}
</script>
</body>
</html>
